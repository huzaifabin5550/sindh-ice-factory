 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sindh Ice Factory — Dealer Detail</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    🧊 Sindh Ice Factory
  </div>
   <div class="navbar-links">
    <a href="/">POS</a>
    <a href="/dealers" class="active">Dealers</a>
    <a href="/reports">Reports</a>
  <a href="/expenditures">💸 Expenditures</a>
    <a href="/reset" style="color:#ffcdd2;">🗑 Reset</a>
    <a href="/logout" style="color:#ffcdd2;">🚪 Logout</a>
</div>
</nav>

<div class="container">

  <div style="margin-bottom:16px;">
    <button class="btn btn-secondary"
      style="width:auto; padding:8px 16px;"
      onclick="window.location.href='/dealers'">
      ← Wapas Dealers
    </button>
  </div>

  <div class="card" id="dealerInfoCard">
    <div style="display:flex; align-items:center; gap:16px;">
      <div class="dealer-avatar" id="dealerAvatar"
        style="width:60px; height:60px; font-size:22px;">
      </div>
      <div style="flex:1;">
        <div style="font-size:20px; font-weight:700;"
          id="dealerNameTitle"></div>
        <div style="font-size:13px; color:#888; margin-top:4px;"
          id="dealerMeta"></div>
      </div>
      <button class="btn btn-danger"
        style="width:auto; padding:8px 16px; font-size:13px;"
        onclick="deleteDealer()">
        🗑 Delete
      </button>
    </div>
  </div>

  <div class="stats-grid"
    style="grid-template-columns:repeat(2,1fr);">
    <div class="stat-card">
      <div class="s-label">Total Ice Kharida</div>
      <div class="s-value text-blue" id="statIce">
        0 blocks
      </div>
    </div>
    <div class="stat-card">
      <div class="s-label">Total Credit</div>
      <div class="s-value text-red" id="statCredit">
        PKR 0
      </div>
    </div>
    <div class="stat-card">
      <div class="s-label">Total Paid</div>
      <div class="s-value text-green" id="statPaid">
        PKR 0
      </div>
    </div>
    <div class="stat-card">
      <div class="s-label">Baqi Balance 🔥</div>
      <div class="s-value text-red" id="statBalance">
        PKR 0
      </div>
    </div>
  </div>

  <div style="margin-bottom:16px;">
    <button class="btn btn-success"
      style="width:100%; padding:14px; font-size:16px;"
      onclick="openPayDebt()">
      💰 Qarz Ada Karein (Pay Debt)
    </button>
  </div>

  <div class="card" style="padding:12px 16px; margin-bottom:0;">
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <label style="font-size:14px; color:#555; font-weight:500;">
        📅 Date Filter:
      </label>
      <input type="date" id="historyDate"
        style="width:auto; padding:8px 12px;"
        onchange="filterHistory()" />
      <button class="btn btn-secondary"
        style="width:auto; padding:8px 14px; font-size:13px;"
        onclick="clearFilter()">
        Sab Dikhao
      </button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Transaction History</div>
    <div id="txnHistory"></div>
  </div> 

</div>

<!-- Pay Debt Modal -->
<div class="modal-overlay hidden" id="payDebtModal">
  <div class="modal-box">
    <div class="modal-title">💰 Qarz Ada Karein</div>

    <div style="background:#FFEBEE; border:1px solid #EF9A9A;
      border-radius:8px; padding:12px 16px; margin-bottom:16px;">
      <div style="font-size:13px; color:#888;">Total Baqi:</div>
      <div style="font-size:24px; font-weight:700; color:#C62828;"
        id="modalDebt">PKR 0</div>
    </div>

    <div class="field-group">
      <label class="field-label">Paid Amount (PKR)</label>
      <input type="number" id="payAmount"
        placeholder="Kitna paisa mila?" />
    </div>

    <div class="field-group">
      <label class="field-label">Reference (optional)</label>
      <input type="text" id="payReference"
        placeholder="e.g. Cash in hand" />
    </div>

    <div class="grid-2" style="gap:8px; margin-top:6px;">
      <button class="btn btn-success" onclick="submitPayment()">
        ✅ Payment Save Karein
      </button>
      <button class="btn btn-secondary" onclick="closePayDebt()">
        ✖ Cancel
      </button>
    </div>
  </div>
</div>

<script src="/static/js/storage.js"></script>
<script src="/static/js/dealer-detail.js"></script>
</body>
</html>
