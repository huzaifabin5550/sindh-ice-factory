 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sindh Ice Factory — POS</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <a href="/" style="color:white; text-decoration:none;">
      🧊 Sindh Ice Factory
    </a>
  </div>
  <div class="navbar-links">
    <a href="/" class="active">POS</a>
    <a href="/dealers">Dealers</a>
    <a href="/reports">Reports</a>
    <a href="/reset" style="color:#ffcdd2;">🗑 Reset</a>
    <a href="/logout" style="color:#ffcdd2;">🚪 Logout</a>
  </div>
</nav>

<div class="container">

  <div class="card">
    <div class="card-title">Customer Type</div>
    <div class="toggle-group">
      <button class="toggle-btn active-blue" id="btnDealer"
        onclick="setCustomerType('dealer')">
        👤 Registered Dealer
      </button>
      <button class="toggle-btn" id="btnWalkin"
        onclick="setCustomerType('walkin')">
        💵 Walk-in Cash
      </button>
    </div>
  </div>

  <div class="card" id="dealerSection">
    <div class="card-title">Dealer Select Karein</div>
    <div class="field-group">
      <label class="field-label">Dealer Name</label>
      <select id="dealerSelect">
        <option value="">— Dealer chunein —</option>
      </select>
    </div>
    <div class="card-title" style="margin-top:10px;">
      Transaction Type
    </div>
    <div class="toggle-group">
      <button class="toggle-btn active-blue" id="btnCredit"
        onclick="setTxnType('Credit')">
        📋 Udhaar (Credit)
      </button>
      <button class="toggle-btn" id="btnCash"
        onclick="setTxnType('Cash')">
        💵 Naqd (Cash)
      </button>
    </div>
  </div>

  <div class="card hidden" id="walkinSection">
    <div class="card-title">Walk-in Customer</div>
    <div style="background:#FFF8E1; border:1px solid #F9A825;
      border-radius:8px; padding:10px 14px; font-size:13px;
      color:#E65100; margin-bottom:12px;">
      ⚠️ Sirf Cash — Koi record save nahi hoga
    </div>
    <div class="field-group">
      <label class="field-label">Customer Name (optional)</label>
      <input type="text" id="walkinName"
        placeholder='Ya khali chhod dein — "Cash" print hoga' />
    </div>
  </div>

  <div class="card">
    <div class="card-title">Ice & Pricing</div>
    <div class="grid-2">
      <div class="field-group">
        <label class="field-label">Ice Blocks (Quantity)</label>
        <input type="number" id="qty" min="1"
          placeholder="e.g. 10" oninput="calcTotal()" />
      </div>
      <div class="field-group">
        <label class="field-label">Price per Block (PKR)</label>
        <input type="number" id="price"
          placeholder="Price dalein"
          oninput="calcTotal()" />
      </div>
    </div>

    <div class="total-box">
      <span class="label">Total Amount</span>
      <span class="amount" id="totalDisplay">PKR 0</span>
    </div>

    <div class="grid-2">
      <div class="field-group">
        <label class="field-label">Date & Time</label>
        <input type="datetime-local" id="txnDate" />
      </div>
      <div class="field-group">
        <label class="field-label">Reference (optional)</label>
        <input type="text" id="reference"
          placeholder="e.g. Truck #4" />
      </div>
    </div>
  </div>

  <div class="grid-2">
    <button class="btn btn-primary" onclick="submitPOS()">
      ✅ Submit & Receipt
    </button>
    <button class="btn btn-secondary" onclick="resetForm()"
      style="width:100%;">
      🔄 Reset
    </button>
  </div>

</div>

<!-- Receipt Modal -->
<div class="modal-overlay hidden" id="receiptModal">
  <div class="receipt-box">
    <div class="receipt-header">
      <div class="receipt-company">🧊 Sindh Ice Factory</div>
      <div style="font-size:12px; color:#888; margin-top:4px;">
        Official Sales Receipt
      </div>
      <div style="font-size:12px; color:#aaa; margin-top:3px;"
        id="receiptDate"></div>
    </div>
    <div id="receiptBody"></div>
    <div class="receipt-footer">
      Shukriya! Dobara tashreef lain. 🙏
    </div>
    <div class="grid-2" style="margin-top:14px; gap:8px;">
      <button class="btn btn-primary" onclick="printReceipt()">
        🖨️ Print
      </button>
      <button class="btn btn-secondary" onclick="closeReceipt()">
        ✖ Band Karein
      </button>
    </div>
  </div>
</div>

<script src="/static/js/storage.js"></script>
<script src="/static/js/pos.js"></script>
<script>
function printReceipt() {
  var content = document.getElementById('receiptBody').innerHTML;
  var date = document.getElementById('receiptDate').textContent;
  var w = window.open('', '_blank');
  var html = '<!DOCTYPE html><html><head><title>Receipt</title><style>';
  html += 'body{font-family:Arial;padding:20px;max-width:400px;margin:0 auto}';
  html += '.receipt-company{font-size:22px;font-weight:bold;color:#1565C0;text-align:center}';
  html += '.receipt-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:14px}';
  html += '.receipt-total{display:flex;justify-content:space-between;font-size:18px;font-weight:bold;color:#1565C0;padding-top:10px}';
  html += '.r-label{color:#777}.r-value{font-weight:600}';
  html += '.badge-blue{background:#E3F2FD;color:#1565C0;padding:2px 8px;border-radius:4px;font-size:12px}';
  html += '.badge-green{background:#E8F5E9;color:#2E7D32;padding:2px 8px;border-radius:4px;font-size:12px}';
  html += '.badge-orange{background:#FFF8E1;color:#E65100;padding:2px 8px;border-radius:4px;font-size:12px}';
  html += '.footer{text-align:center;color:#aaa;font-size:12px;margin-top:16px;border-top:1px dashed #ccc;padding-top:10px}';
  html += '</style></head><body>';
  html += '<div class="receipt-company">🧊 Sindh Ice Factory</div>';
  html += '<p style="text-align:center;color:#888;font-size:12px;margin:4px 0">' + date + '</p>';
  html += '<hr style="border:1px dashed #ccc;margin:10px 0">';
  html += content;
  html += '<div class="footer">Shukriya! Dobara tashreef lain.</div>';
  html += '</body></html>';
  w.document.write(html);
  w.document.close();
  w.print();
}

function createParticles() {
  for (var i = 0; i < 8; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (Math.random() * 15 + 10) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    var size = (Math.random() * 4 + 2) + 'px';
    p.style.width = size;
    p.style.height = size;
    p.style.opacity = Math.random() * 0.4 + 0.1;
    document.body.appendChild(p);
  }
}

document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.btn-primary').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      var ripple = document.createElement('span');
      ripple.className = 'ripple';
      var rect = this.getBoundingClientRect();
      var size = Math.max(rect.width, rect.height);
      ripple.style.width = size + 'px';
      ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
      this.appendChild(ripple);
      var r = ripple;
      setTimeout(function() { r.remove(); }, 600);
    });
  });
  createParticles();
});
</script>
</body>
</html>
