 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sindh Ice Factory — Reports</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <a href="/" style="color:white; text-decoration:none;">
      🧊 Sindh Ice Factory
    </a>
  </div>
  <div class="navbar-links">
    <a href="/">POS</a>
    <a href="/dealers">Dealers</a>
    <a href="/reports" class="active">Reports</a>
    <a href="/logout" style="color:#ffcdd2;">🚪 Logout</a>
  </div>
</nav>

<div class="container">

  <!-- Receipt Search -->
  <div style="margin-bottom:16px;">
    <h2 style="font-size:20px; font-weight:600;">🔍 Receipt Search</h2>
    <p style="font-size:13px; color:#888; margin-top:3px;">
      Serial number se receipt dhundein
    </p>
  </div>

  <div class="card" style="padding:12px 16px;">
    <div style="display:flex; gap:10px; align-items:center;">
      <input type="text" id="searchSerial"
        placeholder="e.g. REC-0001"
        style="flex:1; text-transform:uppercase;"
        onkeypress="handleSearchEnter(event)" />
      <button class="btn btn-primary"
        style="width:auto; padding:10px 20px;"
        onclick="searchReceipt()">
        🔍 Search
      </button>
    </div>
    <div id="searchResult" style="margin-top:12px;"></div>
  </div>
    <p style="font-size:13px; color:#888; margin-top:3px;">
      Aaj ki complete summary
    </p>
  </div>

  <!-- Date Filter -->
  <div class="card" style="padding:12px 16px;">
    <div style="display:flex; align-items:center; gap:12px;">
      <label style="font-size:14px; color:#555; font-weight:500;">
        📅 Date:
      </label>
      <input type="date" id="filterDate"
        style="width:auto; padding:8px 12px;"
        onchange="loadReport()" />
      <button class="btn btn-secondary"
        style="width:auto; padding:8px 14px; font-size:13px;"
        onclick="setToday()">
        Aaj
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid"
    style="grid-template-columns:repeat(2,1fr);">
    <div class="stat-card">
      <div class="s-label">💵 Cash Sales</div>
      <div class="s-value text-green" id="statCash">PKR 0</div>
    </div>
    <div class="stat-card">
      <div class="s-label">📋 Credit Sales</div>
      <div class="s-value text-red" id="statCredit">PKR 0</div>
    </div>
    <div class="stat-card">
      <div class="s-label">🧊 Total Ice Sold</div>
      <div class="s-value text-blue" id="statIce">0 blocks</div>
    </div>
    <div class="stat-card">
      <div class="s-label">💰 Total Earnings</div>
      <div class="s-value" id="statTotal">PKR 0</div>
    </div>
  </div>

  <!-- Filter Buttons -->
  <div class="card" style="padding:12px 16px;">
    <div class="toggle-group">
      <button class="toggle-btn active-blue"
        id="filterAll" onclick="setFilter('all')">Sab</button>
      <button class="toggle-btn"
        id="filterCredit" onclick="setFilter('Credit')">
        Sirf Credit
      </button>
      <button class="toggle-btn"
        id="filterCash" onclick="setFilter('Cash')">
        Sirf Cash
      </button>
      <button class="toggle-btn"
        id="filterPayment" onclick="setFilter('Payment')">
        Payments
      </button>
    </div>
  </div>

  <!-- Transactions Table -->
  <div class="card">
    <div class="card-title">Transactions</div>
    <div id="reportTable"></div>
  </div>

  <!-- Monthly Summary -->
  <div style="margin-top:24px; margin-bottom:16px;">
    <h2 style="font-size:20px; font-weight:600;">
      📅 Monthly Summary
    </h2>
    <p style="font-size:13px; color:#888; margin-top:3px;">
      Har mahine ki complete summary
    </p>
  </div>

  <div class="card">
    <div id="monthlySummary"></div>
  </div>

</div>

<script src="/static/js/storage.js"></script>
<script src="/static/js/reports.js"></script>
</body>
</html>
