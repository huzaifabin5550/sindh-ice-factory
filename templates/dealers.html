 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sindh Ice Factory — Dealers</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    🧊 Sindh Ice Factory
  </div>
  <div class="navbar-links">
    <a href="/">POS</a>
    <a href="/dealers" class="active">Dealers</a>
    <a href="/reports">Reports</a>
  </div>
</nav>

<div class="container">

  <div style="display:flex; justify-content:space-between;
    align-items:center; margin-bottom:16px;">
    <div>
      <h2 style="font-size:20px; font-weight:600;">Dealer List</h2>
      <p style="font-size:13px; color:#888; margin-top:3px;">
        Saare registered dealers
      </p>
    </div>
    <button class="btn btn-primary"
      style="width:auto; padding:10px 20px;"
      onclick="openAddDealer()">
      + Dealer Add Karein
    </button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="s-label">Total Dealers</div>
      <div class="s-value" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Total Baqi (Credit)</div>
      <div class="s-value text-red" id="statBalance">PKR 0</div>
    </div>
  </div>

  <div class="card" style="padding:12px 16px;">
    <input type="text" id="searchInput"
      placeholder="🔍 Dealer naam se search karein..."
      oninput="renderDealers()"
      style="border:none; outline:none;
      font-size:15px; width:100%; background:transparent;" />
  </div>

  <div id="dealerList"></div>

</div>

<!-- Add Dealer Modal -->
<div class="modal-overlay hidden" id="addDealerModal">
  <div class="modal-box">
    <div class="modal-title">➕ Naya Dealer Add Karein</div>

    <div class="field-group">
      <label class="field-label">Dealer Name *</label>
      <input type="text" id="fName"
        placeholder="e.g. Ali Traders" />
    </div>

    <div class="field-group">
      <label class="field-label">Phone Number</label>
      <input type="tel" id="fPhone"
        placeholder="e.g. 0300-1234567" />
    </div>

    <div class="field-group">
      <label class="field-label">CNIC Number</label>
      <input type="text" id="fCnic"
        placeholder="e.g. 42101-1234567-1" />
    </div>

    <div class="field-group">
      <label class="field-label">Location Type</label>
      <div class="toggle-group">
        <button class="toggle-btn active-blue"
          id="locRemote" onclick="setLoc('Remote')">
          Remote
        </button>
        <button class="toggle-btn"
          id="locMobile" onclick="setLoc('Mobile')">
          Mobile
        </button>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Address</label>
      <input type="text" id="fAddress"
        placeholder="e.g. Shop 5, Main Bazar, Hyderabad" />
    </div>

    <div class="grid-2" style="gap:8px; margin-top:6px;">
      <button class="btn btn-primary" onclick="saveDealer()">
        ✅ Save Karein
      </button>
      <button class="btn btn-secondary"
        onclick="closeAddDealer()">
        ✖ Cancel
      </button>
    </div>
  </div>
</div>

<script src="/static/js/storage.js"></script>
<script src="/static/js/dealers.js"></script>
</body>
</html>
