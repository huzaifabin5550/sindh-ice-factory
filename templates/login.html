<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sindh Ice Factory — Login</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    body {
      background: #F0F4F8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .login-box {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      border: 1px solid #E3EAF3;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .login-logo .icon {
      font-size: 48px;
    }
    .login-logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1565C0;
      margin-top: 8px;
    }
    .login-logo p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }
    .error-box {
      background: #FFEBEE;
      border: 1px solid #EF9A9A;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #C62828;
      margin-bottom: 16px;
      display: none;
    }
    .btn-login {
      background: #1565C0;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
    }
    .btn-login:hover {
      background: #0D47A1;
    }
    .default-info {
      background: #E3F2FD;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #1565C0;
      margin-top: 16px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="login-box">
  <div class="login-logo">
    <div class="icon">🧊</div>
    <h1>Sindh Ice Factory</h1>
    <p>POS System — Login</p>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="field-group">
    <label class="field-label">Username</label>
    <input type="text" id="username"
      placeholder="Username dalein"
      onkeypress="handleEnter(event)" />
  </div>

  <div class="field-group">
    <label class="field-label">Password</label>
    <input type="password" id="password"
      placeholder="Password dalein"
      onkeypress="handleEnter(event)" />
  </div>

  <button class="btn-login" onclick="doLogin()">
    🔐 Login Karein
  </button>
</div>

<script>
  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!username || !password) {
      showError('Username aur password dalein!');
      return;
    }

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (data.success) {
        window.location.href = '/';
      } else {
        showError(data.error || 'Galat username ya password!');
      }
    } catch (err) {
      showError('Server se connection nahi ho pa raha!');
    }
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.style.display = 'block';
  }

  function handleEnter(e) {
    if (e.key === 'Enter') doLogin();
  }
</script>

</body>
</html>
