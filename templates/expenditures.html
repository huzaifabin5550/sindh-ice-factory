<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sindh Ice Factory — Expenditures</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <a href="/" style="color:white; text-decoration:none;">
      🧊 Sindh Ice Factory
    </a>
  </div>
  <div class="navbar-links">
    <a href="/">POS</a>
    <a href="/dealers">Dealers</a>
    <a href="/reports">Reports</a>
    <a href="/monthly">📆 Monthly</a>
    <a href="/expenditures" class="active">Expenditures</a>
    <a href="/stats">📊 Stats</a>
    <a href="/reset" style="color:#ffcdd2;">🗑 Reset</a>
    <a href="/reminders">🔔 Reminders</a>
    <a href="/logout" style="color:#ffcdd2;">🚪 Logout</a>
  </div>
</nav>

<div class="container">

  <div style="display:flex; justify-content:space-between;
    align-items:center; margin-bottom:16px;">
    <div>
      <h2 style="font-size:20px; font-weight:600;">
        💸 Expenditures
      </h2>
      <p style="font-size:13px; color:#888; margin-top:3px;">
        Kharchon ka record
      </p>
    </div>
    <button class="btn btn-primary"
      style="width:auto; padding:10px 20px;"
      onclick="openAddExpenditure()">
      + Add Expenditure
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="s-label">Aaj Ka Kharcha</div>
      <div class="s-value text-red" id="statToday">PKR 0</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Total Kharcha</div>
      <div class="s-value text-red" id="statTotal">PKR 0</div>
    </div>
  </div>

  <!-- Date Filter -->
  <div class="card" style="padding:12px 16px;">
    <div style="display:flex; align-items:center; gap:12px;">
      <label style="font-size:14px; color:#555; font-weight:500;">
        📅 Date:
      </label>
      <input type="date" id="filterDate"
        style="width:auto; padding:8px 12px;"
        onchange="loadExpenditures()" />
      <button class="btn btn-secondary"
        style="width:auto; padding:8px 14px; font-size:13px;"
        onclick="setToday()">
        Aaj
      </button>
      <button class="btn btn-secondary"
        style="width:auto; padding:8px 14px; font-size:13px;"
        onclick="loadAll()">
        Sab
      </button>
    </div>
  </div>

  <!-- Expenditures List -->
  <div class="card">
    <div class="card-title">Expenditures List</div>
    <div id="expendituresList"></div>
  </div>

</div>

<!-- Add Expenditure Modal -->
<div class="modal-overlay hidden" id="addModal">
  <div class="modal-box">
    <div class="modal-title">💸 Naya Kharcha Add Karein</div>

    <div class="field-group">
      <label class="field-label">Amount (PKR) *</label>
      <input type="number" id="expAmount"
        placeholder="e.g. 5000" />
    </div>

    <div class="field-group">
      <label class="field-label">Reason *</label>
      <input type="text" id="expReason"
        placeholder="e.g. Bijli ka bill, Diesel, etc." />
    </div>

    <div class="field-group">
      <label class="field-label">Date & Time</label>
      <input type="datetime-local" id="expDate" />
    </div>

    <div class="grid-2" style="gap:8px; margin-top:6px;">
      <button class="btn btn-primary" onclick="saveExpenditure()">
        ✅ Save Karein
      </button>
      <button class="btn btn-secondary" onclick="closeModal()">
        ✖ Cancel
      </button>
    </div>
  </div>
</div>

<script src="/static/js/storage.js"></script>
<script src="/static/js/expenditures.js"></script>
</body>
</html>
